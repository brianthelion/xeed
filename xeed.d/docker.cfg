[xeed.tools.docker]

[xeed.tools.docker.vars]
IMAGE_TAG: {xeed.vars.PROJECT}-docker:{xeed.vars.HASH}
SOCKET_PATH: /var/run/docker.sock
DOCKERFILE_PATH: {xeed.vars.CACHE_DIR}/{xeed.vars.HASH}/xeed-docker.df
LOG_PATH: {xeed.vars.CACHE_DIR}/{xeed.vars.HASH}/log

[xeed.tools.docker.templates.build]
type: xeed.types.tool.subtypes.clitool
cmdstr: docker build \
  --build-arg DOCKER=$({xeed.vars.XEED_CMD} docker/gid) \
  -f {template.DOCKERFILE_PATH} \
  -t {template.IMAGE_TAG} \
  ./

[xeed.tools.docker.templates.run]
type: xeed.types.tool.subtypes.clitool
cmdstr: docker run -it \
  -v {xeed.vars.env.PWD}:{xeed.vars.env.PWD} \
  -w {xeed.vars.env.PWD} \
  {template.EXTRA_RUN_ARGS} \
  {template.IMAGE_TAG} \
  {template.CONTAINER_CMD}

[xeed.tools.docker.cmds.docker]
description: run a docker command in the xeed Docker environment
type: xeed.types.tool.subtypes.templatetool
depends_on: xeed.tools.docker.cmds.docker/build
template: xeed.tools.docker.templates.run
EXTRA_RUN_ARGS: -v {xeed.tools.docker.vars.SOCKET_PATH}:{xeed.tools.docker.vars.SOCKET_PATH}
IMAGE_TAG: {xeed.tools.docker.vars.IMAGE_TAG}
CONTAINER_CMD: docker {xeed.vars.cli.EXTRA_ARGS}

[xeed.tools.docker.files.docker]
path: {xeed.tools.docker.vars.DOCKERFILE_PATH}
contents:
  FROM debian:latest
  ARG DOCKER
  RUN groupadd -g $DOCKER docker
  RUN apt-get update
  RUN apt-get install -y \
      ca-certificates \
      curl
  RUN curl -fsSL \
      https://get.docker.com \
      -o get-docker.sh
  RUN sh get-docker.sh
  RUN rm get-docker.sh
  RUN apt-get install -y \
      docker-ce \
      docker-ce-cli \
      containerd.io \
      docker-buildx-plugin \
      docker-compose-plugin
  RUN groupadd -g {xeed.vars.user.GID} {xeed.vars.user.NAME}
  RUN useradd -u {xeed.vars.user.UID} -g {xeed.vars.user.GID} -G docker {xeed.vars.user.NAME}
  USER {xeed.vars.user.NAME}

[xeed.tools.docker.cmds.docker/build]
type: xeed.types.tool.subtypes.templatetool
template: xeed.tools.docker.templates.build
DOCKERFILE_PATH: {xeed.tools.docker.vars.DOCKERFILE_PATH}
IMAGE_TAG: {xeed.tools.docker.vars.IMAGE_TAG}

[xeed.tools.docker.cmds.docker/gid]
type: xeed.types.tool.subtypes.clitool
cmdstr: getent group docker | cut -d: -f3
