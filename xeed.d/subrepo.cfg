[xeed.tools.subrepo]

[xeed.tools.subrepo.vars]
IMAGE_TAG: {xeed.vars.PROJECT}-subrepo:{xeed.vars.HASH}
DOCKERFILE_PATH: {xeed.vars.CACHE_DIR}/{xeed.vars.HASH}/subrepo.df
LOG_PATH: {xeed.vars.CACHE_DIR}/{xeed.vars.HASH}/log

[xeed.tools.subrepo.cmds.subrepo/build]
type: xeed.types.tool.subtypes.templatetool
template: xeed.tools.docker.templates.build
DOCKERFILE_PATH: {xeed.tools.subrepo.vars.DOCKERFILE_PATH}
IMAGE_TAG: {xeed.tools.subrepo.vars.IMAGE_TAG}

[xeed.tools.subrepo.cmds.subrepo]
type: xeed.types.tool.subtypes.templatetool
depends_on: xeed.tools.subrepo.cmds.subrepo/build
template: xeed.tools.docker.templates.run
IMAGE_TAG: {xeed.tools.subrepo.vars.IMAGE_TAG}
CONTAINER_CMD: subrepo {xeed.vars.cli.EXTRA_ARGS}
EXTRA_RUN_ARGS: ""

[xeed.tools.subrepo.files.subrepo]
path: {xeed.tools.subrepo.vars.DOCKERFILE_PATH}
contents:
  FROM python:latest
  RUN pip install --upgrade pip wheel
  RUN pip install git-subrepo
  RUN apt-get update
  RUN apt-get install git man-db -y
  RUN git config --system --add safe.directory '*'
  RUN groupadd -g {xeed.vars.user.GID} {xeed.vars.user.NAME}
  RUN useradd -u {xeed.vars.user.UID} -g {xeed.vars.user.GID} {xeed.vars.user.NAME}
  USER {xeed.vars.user.NAME}
