[xeed.types.tool.subtypes.pytool]
code:
    : class PyTool(Tool):
    :     def run(self, resolver, toolchest, **kwargs):
    :         retcode = super().run(resolver, toolchest, **kwargs)
    :         if retcode != self.SUCCESS:
    :            return retcode
    :         code = resolver(self._config_blob.get("code"))
    :         LOG.debug(f"{code}")
    :         eval(code, kwargs)
    :         return self.SUCCESS

[xeed.types.tool.subtypes.templatetool]
code:
    : class TemplateTool(Tool):
    :     """
    :     A meta-tool that builds and runs another tool from a template.
    :     """
    :     def run(self, resolver, toolchest, blob, **kwargs):
    :         retcode = super().run(resolver, toolchest, blob=blob, **kwargs)
    :         if retcode != self.SUCCESS:
    :            return retcode
    :         self_config_blob = self._config_blob.copy()
    :         assert self_config_blob.pop("type").endswith("templatetool")
    :         template_path = self_config_blob.pop("template")
    :         new_tool_blob = blob.get_path(template_path).copy()
    :         final_type_name = new_tool_blob["type"]
    :         final_tool_type = toolchest.types[final_type_name]
    :         final_tool = final_tool_type.from_blob(new_tool_blob)
    :         blob["template"] = self._config_blob
    :         out = final_tool.run(resolver, toolchest, blob=blob, **kwargs)
    :         return out