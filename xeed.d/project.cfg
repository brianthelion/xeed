[xeed.tools.project]
depends_on: xeed.tools.docker

[xeed.tools.project.vars]
TAG: {xeed.vars.PROJECT}-project:{xeed.vars.HASH}
DOCKERFILE_PATH: {xeed.tools.project.files.dockerfile.path}
TEST_SCRIPT_PATH: {xeed.tools.project.files.test_script.path}
LOG_PATH: {xeed.vars.CACHE_DIR}/{xeed.vars.HASH}/log

[xeed.tools.project.cmds.project/build]
type: xeed.types.tool.subtypes.templatetool
template: xeed.tools.docker.templates.build
DOCKERFILE_PATH: {xeed.tools.project.vars.DOCKERFILE_PATH}
IMAGE_TAG: {xeed.tools.project.vars.TAG}

[xeed.tools.project.cmds.project/desktop_app/linux]
type: xeed.types.tool.subtypes.templatetool
depends_on: xeed.tools.project.cmds.project/build
template: xeed.tools.docker.templates.run
IMAGE_TAG: {xeed.tools.project.vars.TAG}
CONTAINER_CMD: bash {xeed.tools.project.vars.TEST_SCRIPT_PATH}
EXTRA_RUN_ARGS: -e DISPLAY=:0 -e QT_QUICK_BACKEND=software -v /tmp/.X11-unix:/tmp/.X11-unix

[xeed.tools.project.files.dockerfile]
path: {xeed.vars.CACHE_DIR}/{xeed.vars.HASH}/xeed-project.df
contents:
  FROM python:latest
  RUN apt-get update
  RUN apt-get install -y --no-install-recommends \
      libegl1 \
      libgl1-mesa-dev \
      libxkbcommon-x11-0 \
      libdbus-1-3 \
      libxcb-cursor0 \
      libxcb-icccm4 \
      libxcb-image0 \
      libxcb-keysyms1 \
      libxcb-randr0 \
      libxcb-render-util0 \
      libxcb-xinerama0 \
      libxcb-xinput0 \
      libxcb-xfixes0 \
      libxcb-shape0
  RUN apt-get clean
  RUN rm -rf /var/lib/apt/lists/*
  RUN pip install --upgrade pip wheel
  ENV SETUPTOOLS_SCM_PRETEND_VERSION=0.0.0
  COPY ./lib ./lib
  RUN pip install "PySide6>=6.0.0"
  RUN pip install ./lib/desktop-app

[xeed.tools.project.files.test_script]
path: {xeed.vars.CACHE_DIR}/{xeed.vars.HASH}/run_desktop_app.sh
contents:
  set -ex
  python3 -m desktop_app
