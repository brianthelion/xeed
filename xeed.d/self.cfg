[xeed.tools.self.cmds.self/pull]
type: xeed.types.tool.subtypes.pytool
code:
    : import json, base64, re, os, urllib.request
    : _gh_repo = '{xeed.vars.ORIGIN_REPO}'.replace('https://github.com/', '')
    : _gh_base = 'https://api.github.com/repos/' + _gh_repo + '/'
    : _token = os.environ['GITHUB_TOKEN']
    : def _api(path, method='GET', data=None):
    :     req = urllib.request.Request(_gh_base + path,
    :               headers={{'Accept': 'application/vnd.github+json', 'Authorization': 'Bearer ' + _token}},
    :               method=method, data=json.dumps(data).encode() if data else None)
    :     with urllib.request.urlopen(req) as r:
    :         return json.loads(r.read())
    : def _get_file(ref, rel_path):
    :     resp = _api('contents/' + rel_path + '?ref=' + ref)
    :     return base64.b64decode(resp['content'])
    : _xeed_path = '{xeed.vars.env.PWD}/xeed'
    : _xeed_d = '{xeed.vars.env.PWD}/xeed.d'
    : _origin_hash = re.search(r'XEED_ORIGIN_HASH\s*=\s*"([^"]+)"', open(_xeed_path).read()).group(1)
    : _canonical = ['xeed'] + ['xeed.d/' + os.path.basename(f) for f in sorted(__import__('glob').glob(_xeed_d + '/*.cfg')) if not os.path.basename(f).startswith('__')]
    : _dirty = [r for r in _canonical if _get_file(_origin_hash, r) != open(_xeed_path if r == 'xeed' else _xeed_d + '/' + os.path.basename(r), 'rb').read()]
    : _dirty and __import__('sys').exit('Local modifications detected in: ' + str(_dirty) + '. Run xeed self/push first.')
    : _head_hash = _api('git/refs/heads/main')['object']['sha']
    : [open(_xeed_path if r == 'xeed' else _xeed_d + '/' + os.path.basename(r), 'wb').write(re.sub(rb'XEED_ORIGIN_HASH\s*=\s*"[^"]+"', ('XEED_ORIGIN_HASH = "' + _head_hash + '"').encode(), _get_file(_head_hash, r)) if r == 'xeed' else _get_file(_head_hash, r)) for r in _canonical]
    : os.chmod(_xeed_path, 0o755)
    : print('Pulled. XEED_ORIGIN_HASH updated to ' + _head_hash)

[xeed.tools.self.cmds.self/push]
type: xeed.types.tool.subtypes.pytool
code:
    : import json, base64, re, os, urllib.request, datetime
    : _gh_repo = '{xeed.vars.ORIGIN_REPO}'.replace('https://github.com/', '')
    : _gh_base = 'https://api.github.com/repos/' + _gh_repo + '/'
    : _token = os.environ['GITHUB_TOKEN']
    : def _api(path, method='GET', data=None):
    :     req = urllib.request.Request(_gh_base + path,
    :               headers={{'Accept': 'application/vnd.github+json', 'Authorization': 'Bearer ' + _token}},
    :               method=method, data=json.dumps(data).encode() if data else None)
    :     with urllib.request.urlopen(req) as r:
    :         return json.loads(r.read())
    : def _get_file(ref, rel_path):
    :     resp = _api('contents/' + rel_path + '?ref=' + ref)
    :     return base64.b64decode(resp['content']), resp['sha']
    : _xeed_path = '{xeed.vars.env.PWD}/xeed'
    : _xeed_d = '{xeed.vars.env.PWD}/xeed.d'
    : _origin_hash = re.search(r'XEED_ORIGIN_HASH\s*=\s*"([^"]+)"', open(_xeed_path).read()).group(1)
    : _canonical = ['xeed'] + ['xeed.d/' + os.path.basename(f) for f in sorted(__import__('glob').glob(_xeed_d + '/*.cfg')) if not os.path.basename(f).startswith('__')]
    : _changed = [(r, open(_xeed_path if r == 'xeed' else _xeed_d + '/' + os.path.basename(r), 'rb').read(), _get_file(_origin_hash, r)[1]) for r in _canonical if _get_file(_origin_hash, r)[0] != open(_xeed_path if r == 'xeed' else _xeed_d + '/' + os.path.basename(r), 'rb').read()]
    : print('Nothing to push.') if not _changed else None
    : if _changed:
    :     _branch = 'self/push-' + datetime.datetime.utcnow().strftime('%%Y%%m%%d-%%H%%M%%S')
    :     _head_sha = _api('git/refs/heads/main')['object']['sha']
    :     _api('git/refs', method='POST', data={{'ref': 'refs/heads/' + _branch, 'sha': _head_sha}})
    :     [_api('contents/' + r, method='PUT', data={{'message': 'self/push: update ' + r, 'content': base64.b64encode(c).decode(), 'sha': s, 'branch': _branch}}) for r, c, s in _changed]
    :     _pr = _api('pulls', method='POST', data={{'title': 'self/push from ' + __import__('socket').gethostname(), 'body': 'Automated push via xeed self/push', 'head': _branch, 'base': 'main'}})
    :     print('PR opened: ' + _pr['html_url'])

