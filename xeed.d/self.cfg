[xeed.tools.self.lib]
SYNC_CLASS:
    : class XeedSync:
    :     GH_API = 'https://api.github.com/repos/'
    :     GH_URL = 'https://github.com/'
    :     GH_ACCEPT = 'application/vnd.github+json'
    :     MAIN_REF = 'git/refs/heads/main'
    :     BASE_BRANCH = 'main'
    :     ORIGIN_HASH_PAT = r'XEED_ORIGIN_HASH\s*=\s*"([^"]+)"'
    :     PR_BODY = 'Automated push via xeed self/push'
    :
    :     def __init__(self, pwd, origin_repo, token):
    :         self.xeed = pwd + '/xeed'
    :         self.xeed_d = pwd + '/xeed.d'
    :         self.token = token
    :         self.gh_base = self.GH_API + origin_repo.replace(self.GH_URL, '') + '/'
    :
    :     def api(self, path, method='GET', data=None):
    :         req = urllib.request.Request(
    :             self.gh_base + path,
    :             headers={{
    :                 'Accept': self.GH_ACCEPT,
    :                 'Authorization': 'Bearer ' + self.token,
    :             }},
    :             method=method,
    :             data=json.dumps(data).encode() if data else None,
    :         )
    :         with urllib.request.urlopen(req) as r:
    :             return json.loads(r.read())
    :
    :     def get_file(self, ref, path):
    :         resp = self.api('contents/' + path + '?ref=' + ref)
    :         return base64.b64decode(resp['content']), resp['sha']
    :
    :     def local(self, r):
    :         if r == 'xeed':
    :             return self.xeed
    :         return self.xeed_d + '/' + os.path.basename(r)
    :
    :     @property
    :     def origin_hash(self):
    :         return re.search(self.ORIGIN_HASH_PAT, open(self.xeed).read()).group(1)
    :
    :     @property
    :     def canonical(self):
    :         cfgs = [
    :             'xeed.d/' + os.path.basename(f)
    :             for f in sorted(glob.glob(self.xeed_d + '/*.cfg'))
    :             if not os.path.basename(f).startswith('__')
    :         ]
    :         return ['xeed'] + cfgs
    :
    :     def pull(self):
    :         origin = self.origin_hash
    :         dirty = [
    :             r for r in self.canonical
    :             if self.get_file(origin, r)[0] != open(self.local(r), 'rb').read()
    :         ]
    :         if dirty:
    :             sys.exit(
    :                 'Local modifications detected in: ' + str(dirty)
    :                 + '. Run xeed self/push first.'
    :             )
    :         head = self.api(self.MAIN_REF)['object']['sha']
    :         for r in self.canonical:
    :             content, _ = self.get_file(head, r)
    :             if r == 'xeed':
    :                 content = re.sub(
    :                     rb'XEED_ORIGIN_HASH\s*=\s*"[^"]+"',
    :                     ('XEED_ORIGIN_HASH = "' + head + '"').encode(),
    :                     content,
    :                 )
    :             open(self.local(r), 'wb').write(content)
    :         os.chmod(self.xeed, 0o755)
    :         print('Pulled. XEED_ORIGIN_HASH updated to ' + head)
    :
    :     def push(self, args=None):
    :         args = list(args or [])
    :         branch = args[0] if len(args) > 0 else None
    :         message = ' '.join(args[1:]) if len(args) > 1 else None
    :         origin = self.origin_hash
    :         changed = []
    :         for r in self.canonical:
    :             remote, sha = self.get_file(origin, r)
    :             local = open(self.local(r), 'rb').read()
    :             if remote != local:
    :                 changed.append((r, local, sha))
    :         if not changed:
    :             print('Nothing to push.')
    :             return
    :         if not branch or not message:
    :             sys.exit('Usage: xeed self/push <branch> "<commit message>"')
    :         head_sha = self.api(self.MAIN_REF)['object']['sha']
    :         try:
    :             self.api('git/refs', method='POST', data={{
    :                 'ref': 'refs/heads/' + branch,
    :                 'sha': head_sha,
    :             }})
    :         except urllib.error.HTTPError as e:
    :             if e.code != 422:
    :                 raise
    :         for r, content, sha in changed:
    :             self.api('contents/' + r, method='PUT', data={{
    :                 'message': message,
    :                 'content': base64.b64encode(content).decode(),
    :                 'sha': sha,
    :                 'branch': branch,
    :             }})
    :         pr = self.api('pulls', method='POST', data={{
    :             'title': message,
    :             'body': self.PR_BODY,
    :             'head': branch,
    :             'base': self.BASE_BRANCH,
    :         }})
    :         print('PR opened: ' + pr['html_url'])

