[xeed.tools.self]
depends_on: xeed.tools.docker

[xeed.tools.self.vars]
TAG: {xeed.vars.PROJECT}-self:{xeed.vars.HASH}
DOCKERFILE_PATH: {xeed.tools.self.files.dockerfile.path}
TEST_SCRIPT_PATH: {xeed.tools.self.files.test_script.path}
LOG_PATH: {xeed.vars.CACHE_DIR}/{xeed.vars.HASH}/log

[xeed.tools.self.cmds.self/install]
type: xeed.types.tool.subtypes.pytool
code:
    : __import__('urllib.request').request.urlretrieve(
    :     '{xeed.vars.ORIGIN_REPO}'.replace('https://github.com/', 'https://raw.githubusercontent.com/') + '/main/xeed.d/{xeed.vars.cli.EXTRA_ARGS}.cfg',
    :     '{xeed.vars.env.PWD}/xeed.d/{xeed.vars.cli.EXTRA_ARGS}.cfg'
    : )

[xeed.tools.self.cmds.self/build]
type: xeed.types.tool.subtypes.templatetool
template: xeed.tools.docker.templates.build
DOCKERFILE_PATH: {xeed.tools.self.vars.DOCKERFILE_PATH}
IMAGE_TAG: {xeed.tools.self.vars.TAG}

[xeed.tools.self.cmds.self/test]
type: xeed.types.tool.subtypes.templatetool
depends_on: xeed.tools.self.cmds.self/build
template: xeed.tools.docker.templates.run
IMAGE_TAG: {xeed.tools.self.vars.TAG}
CONTAINER_CMD: bash {xeed.tools.self.vars.TEST_SCRIPT_PATH}
EXTRA_RUN_ARGS: -e PYTHONDONTWRITEBYTECODE=1

[xeed.tools.self.cmds.self/help]
type: xeed.types.tool.subtypes.pytool
code:
    : cli.print_help('{xeed.vars.HASH}')

[xeed.tools.self.files.dockerfile]
path: {xeed.vars.CACHE_DIR}/{xeed.vars.HASH}/xeed-self.df
contents:
  FROM python:latest
  RUN pip install --upgrade pip wheel
  RUN pip install pytest

[xeed.tools.self.files.test_script]
path: {xeed.vars.CACHE_DIR}/{xeed.vars.HASH}/xeed-test.sh
contents:
  set -ex
  cd $(mktemp -d)
  ln -s {xeed.vars.XEED_EXE} ./xeed.py
  pytest -vvv xeed.py
